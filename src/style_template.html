<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Reflection Styles</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-primary-accent" style="background-color: #1a1a24;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary-accent" href="index.html">
                <i class="bi bi-pen me-2"></i>Reflection Styles
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            
            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 d-none d-md-block sidebar-wrapper">
                <h6 class="text-uppercase text-muted fw-bold mb-3 px-3">Available Styles</h6>
                {{MENU}}
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-8">
                
                <nav aria-label="breadcrumb" class="mt-2 mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html" class="text-primary-accent text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item active text-light" aria-current="page">{{TITLE}}</li>
                    </ol>
                </nav>

                <div class="glass-panel p-4 p-md-5 rounded shadow mb-5">
                    <h1 class="display-6 fw-bold mb-4 text-primary-accent border-bottom border-secondary pb-3">
                        {{TITLE}}
                    </h1>
                    
                    <div class="lead bg-darker p-4 rounded border-start border-4 border-primary-accent mb-5 text-light opacity-75 instruction-text">
                        {{DESCRIPTION}}
                    </div>

                    <h3 class="mb-4 text-light"><i class="bi bi-lightbulb text-warning me-2"></i>Examples</h3>
                    
                    <div class="examples-container">
                        {{EXAMPLES}}
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
